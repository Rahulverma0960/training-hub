<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foundation Session | Module 1</title>
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #edf2f7; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #111827; overflow-x: hidden; }
        body.locked { overflow: hidden; height: 100vh; }

        /* Full Screen UI */
        .topbar { background: var(--dark); padding: 20px; color: #fff; text-align: center; }
        
        /* Premium Container */
        .container { max-width: 900px; margin: 20px auto; padding: 20px; }
        
        .video-card { background: #000; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .video-container { position: relative; padding-top: 56.25%; }
        .video-container iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:0; }

        /* Lock Screen Enhancement */
        .lock-screen {
            position: fixed; top:0; left:0; width:100%; height:100%; background: #0b0f19;
            color: #fff; display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        .lock-box { text-align: center; padding: 20px; }
        .lock-box h1 { font-size: 2.5rem; margin-bottom: 20px; color: #ffbc00; }
        
        /* Status Bar Fix */
        .status-bar { background: #fff; border-radius: 12px; padding: 15px; margin: 20px 0; display: flex; justify-content: space-between; border: 1px solid #e5e7eb; }
        
        .btn-premium { width: 100%; padding: 20px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

<!-- FULL SCREEN TRIGGER -->
<div id="lockScreen" class="lock-screen">
    <div class="lock-box">
        <h1 id="lockTitle">⏳ Foundation Session</h1>
        <p id="lockText">Access will be granted automatically when the training window opens.</p>
        <div id="startCountdown" style="font-size: 3rem; font-weight: bold; margin-top: 20px;">00:00:00</div>
    </div>
</div>

<div class="topbar"><h1>🏛 FOUNDATION SESSION</h1></div>

<div class="container">
    <div class="status-bar">
        <span id="liveStatus">🟢 Batch Access Active</span>
        <span id="viewerCount">👁 85 Participants</span>
    </div>

    <div class="video-card">
        <div id="videoContainer" class="video-container"></div>
    </div>
    
    <button class="btn-premium" id="nextBtn">Clarification Session Locked 🔒</button>
</div>

<script>
    /* 1. Full Screen Logic */
    document.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(e => console.log(e));
        }
    });

    /* 2. Enhanced Timing & Reload Logic */
    const startHour = 13; // 1 PM
    const endHour = 16;   // 4 PM
    
    function checkAccess() {
        const now = new Date();
        const currentHour = now.getHours();
        
        if (currentHour >= startHour && currentHour < endHour) {
            document.getElementById("lockScreen").style.display = "none";
            document.body.classList.remove("locked");
        } else {
            document.getElementById("lockScreen").style.display = "flex";
            document.body.classList.add("locked");
            
            // Auto-refresh when time hits startHour
            if (currentHour >= endHour || currentHour < startHour) {
                const target = new Date();
                target.setHours(startHour, 0, 0, 0);
                const diff = target - now;
                
                // Show countdown
                const h = Math.floor(diff/3600000);
                const m = Math.floor((diff/60000)%60);
                const s = Math.floor((diff/1000)%60);
                document.getElementById("startCountdown").innerHTML = 
                    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                
                // BUG FIX: Auto-reload when timer hits 0
                if(diff <= 0) location.reload();
            }
        }
    }

    setInterval(checkAccess, 1000);
    checkAccess();

    /* 3. API Fetch */
    fetch("https://script.google.com/macros/s/AKfycbyBGzC3nQkOp6eTtBqHU0bTW6tx9-BBeaqLslDdfunccXXanSaAkebcU-cJMNzp6us-Cg/exec")
    .then(r => r.json())
    .then(data => {
        document.getElementById("videoContainer").innerHTML = data.day1_v2;
    });
</script>
</body>
</html>
